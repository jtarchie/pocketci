version: "2"

linters:
  enable:
    # Correctness
    - errorlint      # %v vs %w, errors.Is/As instead of == / type assertions
    - musttag        # JSON tags required on marshaled structs (Goja VM requirement)
    - recvcheck      # Consistent pointer vs value receivers
    - wastedassign   # Assignments whose values are never read
    - nolintlint     # Stale or malformed //nolint directives
    # Style / consistency
    - sloglint       # Consistent slog usage (DiscardHandler, key-value pairs)
    # Performance
    - perfsprint     # Replace fmt.Sprintf/Errorf with faster alternatives
    - prealloc       # Pre-allocate slices where capacity is known

linters-settings:
  sloglint:
    # Enforce slog.DiscardHandler over slog.NewTextHandler(io.Discard, nil)
    no-raw-keys: false
