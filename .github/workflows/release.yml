name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true
          cache: true

      - uses: actions/setup-node@v5
        with:
          cache: "npm"
          cache-dependency-path: |
            docs/package-lock.json
            server/static/package-lock.json

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: ${{ runner.os }}-deno-${{ hashFiles('**/deno.lock', '**/*.ts') }}
          restore-keys: |
            ${{ runner.os }}-deno-

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            docs/node_modules
            server/static/node_modules
            server/static/dist
            server/docs/site
            backwards/bundle.js
          key: ${{ runner.os }}-build-${{ hashFiles('docs/package-lock.json', 'docs/**/*.md', 'docs/.vitepress/config.ts', 'server/static/package-lock.json', 'backwards/src/**/*.ts') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
