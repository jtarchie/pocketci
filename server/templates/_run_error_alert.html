{{ define "run-error-alert" }}
<div id="run-error-alert" {{ if .SwapOOB }} hx-swap-oob="true" {{ end }}>
  {{ if and .Run .Run.ErrorMessage }}
  <div
    class="mb-4 p-4 border rounded-lg bg-red-100 border-red-200 dark:bg-red-900/30 dark:border-red-800"
    role="alert"
    aria-live="assertive">
    <div class="flex items-start gap-2">
      <svg class="w-5 h-5 text-red-600 dark:text-red-400 shrink-0 mt-0.5"
        viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd"
          d="M10 18a8 8 0 100-16 8 8 0 000 16zm-1-4a1 1 0 112 0 1 1 0 01-2 0zm.293-8.707a1 1 0 011.414 0L11 5.586V11a1 1 0 11-2 0V5.586l.293-.293z"
          clip-rule="evenodd" />
      </svg>
      <div>
        <p class="text-sm font-semibold text-red-800 dark:text-red-200">Run
          failed</p>
        <p class="text-sm text-red-700 dark:text-red-300 whitespace-pre-wrap">{{
          .Run.ErrorMessage }}</p>
      </div>
    </div>
  </div>
  {{ end }}
</div>
{{ end }}
