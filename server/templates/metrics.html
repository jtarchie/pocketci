{{ template "head" dict "Title" "Metrics" }}
<!-- Breadcrumb navigation -->
<nav
  class="bg-gray-50 dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 text-sm sm:text-base"
  aria-label="Breadcrumb">
  <ol class="flex items-center list-none px-4 py-2 sm:py-3">
    <li>
      <a href="/pipelines/"
        class="text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200">Pipelines</a>
    </li>
    <li class="flex items-center">
      <svg class="mx-2 h-4 w-4 text-gray-400" viewBox="0 0 20 20"
        fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd"
          d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z"
          clip-rule="evenodd" />
      </svg>
      <span class="text-gray-800 dark:text-white font-medium">Metrics</span>
    </li>
  </ol>
</nav>

<main id="main-content" role="main">
  <div class="container mx-auto p-4">
    <div
      class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between mb-6">
      <div>
        <h1 class="text-3xl font-bold dark:text-white">Metrics</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">System health
          and pipeline performance. Refreshes every 10 seconds.</p>
      </div>
    </div>

    {{ template "metrics-content" . }}
  </div>
</main>

{{ template "footer" . }}
{{ template "end" . }}
