{{- define "run-status-badge" -}}
{{- if or .IsActive (not .Run) -}}
<span id="run-status-badge" {{ if .SwapOOB }} hx-swap-oob="true" {{ end
  }}></span>
{{- else -}}
{{- $status := .Run.Status -}}
{{- if eq $status "success" -}}
<span id="run-status-badge" {{ if .SwapOOB }} hx-swap-oob="true" {{ end }}
  class="flex items-center gap-1.5 text-sm font-medium text-green-700 dark:text-green-400 bg-green-100 dark:bg-green-900/40 border border-green-300 dark:border-green-700 rounded-full px-2.5 py-0.5">
  <svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 20 20" fill="currentColor"
    aria-hidden="true">
    <path fill-rule="evenodd"
      d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
      clip-rule="evenodd" />
  </svg>
  Success
</span>
{{- else if eq $status "failed" -}}
<span id="run-status-badge" {{ if .SwapOOB }} hx-swap-oob="true" {{ end }}
  class="flex items-center gap-1.5 text-sm font-medium text-red-700 dark:text-red-400 bg-red-100 dark:bg-red-900/40 border border-red-300 dark:border-red-700 rounded-full px-2.5 py-0.5">
  <svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 20 20" fill="currentColor"
    aria-hidden="true">
    <path fill-rule="evenodd"
      d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
      clip-rule="evenodd" />
  </svg>
  Failed
</span>
{{- else -}}
<span id="run-status-badge" {{ if .SwapOOB }} hx-swap-oob="true" {{ end }}
  class="flex items-center gap-1.5 text-sm font-medium text-gray-600 dark:text-gray-400 bg-gray-100 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-full px-2.5 py-0.5">
  {{ printf "%s" $status | title }}
</span>
{{- end -}}
{{- end -}}
{{- end -}}
