{{ define "graph-partial" }}
<!-- Graph data partial - used for htmx polling -->
{{ if .OOB }}
{{ template "_run_error_alert" dict "Run" .Run "SwapOOB" true }}
{{ template "run-status-badge" dict "Run" .Run "IsActive" .IsActive "SwapOOB"
true }}
{{ end }}
<script type="application/json" id="graph-data"
  data-path="{{ .Path }}"
  data-run-active="{{ if .IsActive }}true{{ else }}false{{ end }}"
  {{ if .RunID }}
  hx-get="/runs/{{ .RunID }}/graph-data/"
  hx-trigger="every 3s"
  hx-swap="morph:outerHTML"
  {{ end }}>{{ .TreeJSON }}</script>
{{ end }}
