version: 3

tasks:
  build:
    cmds:
      - task: build:static
      - task: build:docs
      - go generate ./...
  build:binary:
    desc: Build optimized binary with stripped debug info
    cmds:
      - go build -ldflags="-s -w" -trimpath -o pocketci .
  build:static:
    dir: server/static
    cmds:
      - npm install
      - npm run build
  build:docs:
    dir: docs
    cmds:
      - npm install
      - npm run build
  fmt:
    cmds:
      - deno fmt --ignore=server/templates/,server/docs/,server/static/dist/bundle.js .
      - deno lint --rules-exclude=no-window,no-process-global,no-node-globals --ignore=server/static/dist/,server/templates/,server/docs/ .
      - deno check examples/both/*.ts examples/run/*.ts examples/both/hello-world.js
      - shellcheck bin/*.sh
      - shfmt -w bin/
      - gofmt -w .
      - |
          if [ "${CI}" != "true" ]; then
            golangci-lint run ./... --fix
          fi
  test:
    cmds:
      - task: cleanup
      - defer: { task: cleanup }
      - go test -race ./...
      - task: test:e2e
  default:
    cmds:
      - task: build
      - task: fmt
      - task: test
  test:e2e:
    dir: e2e
    cmds:
      - rm -f e2e-test.db
      - npx playwright test tests/accordion.spec.ts tests/docs.spec.ts tests/pipelines.spec.ts tests/search_pagination.spec.ts tests/share.spec.ts

  docs:screenshots:
    desc: Regenerate getting-started guide screenshots (macOS only, not CI)
    dir: e2e
    cmds:
      - rm -f e2e-test.db e2e-secrets.db
      - npx playwright test getting-started
      - npx playwright test production

  test:vz:
    desc: Run VZ driver tests with codesigning
    cmds:
      - |
          cat > entitlements.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.virtualization</key>
              <true/>
          </dict>
          </plist>
          EOF
      - go test -c -o vz.test ./orchestra/vz
      - codesign -s - -f --entitlements entitlements.plist ./vz.test
      - ./vz.test -test.v
      - rm -f vz.test entitlements.plist
  # Watch source files only. Exclude generated bundles in server/static/dist and node_modules
  server: "wgo -file .html -file .ts -file .go -dir server/static/src go generate ./... :: go run main.go server --storage sqlite://test.db"

  # Benchmark tasks
  bench:
    desc: Run all Go benchmarks (micro + pipeline)
    cmds:
      - go test -bench=. -benchmem -count=3 ./runtime/... ./storage/... ./examples/...

  bench:k6:
    desc: Run k6 API load benchmarks (starts server automatically)
    cmds:
      - ./bin/k6-with-server.sh run benchmarks/api_load.js

  bench:k6:smoke:
    desc: Quick k6 smoke test (starts server automatically)
    cmds:
      - ./bin/k6-with-server.sh run --vus 1 --duration 10s benchmarks/api_load.js

  bench:profile:
    desc: |
      Profile the server under k6 load and open an interactive flame graph.
      Starts server with pprof on :6060, runs k6 load scenario for 30s,
      then collects a CPU profile and opens it in a browser.
      Usage: task bench:profile
    cmds:
      - |
          PPROF=1 ./bin/k6-with-server.sh run --vus 10 --duration 30s benchmarks/api_load.js &
          K6_PID=$!
          echo "Collecting CPU profile (30s)..."
          go tool pprof -http=:8888 "http://localhost:6060/debug/pprof/profile?seconds=25"
          wait $K6_PID || true

  cleanup:
    desc: Remove leaked Docker containers and volumes
    cmds:
      - ./bin/cleanup.sh

  deploy:
    desc: Deploy to Fly.io (requires flyctl and authentication)
    cmds:
      - task: build
      - flyctl deploy

  deploy:nuke:
    desc: Nuke and redeploy — destroys volume, recreates it, and deploys fresh
    prompt: This will DELETE all persistent data. Are you sure?
    cmds:
      - task: build
      - flyctl scale count 0 --yes
      - |
          for id in $(flyctl volumes list --json | jq -r '.[].id'); do
            flyctl volumes destroy "$id" --yes
          done
      - flyctl volumes create ci_data --region sjc --size 1 --yes
      - flyctl deploy

  bump:
    desc: Bump all Go and npm dependencies to latest versions
    cmds:
      - echo "Bumping Go dependencies..."
      - go get -u ./...
      - go mod tidy
      - echo "Bumping npm dependencies in e2e..."
      - cd e2e && npx npm-check-updates -u && npm install
      - echo "Bumping npm dependencies in packages/pocketci..."
      - cd packages/pocketci && npx npm-check-updates -u && npm install
      - echo "Bumping npm dependencies in examples..."
      - cd examples && npx npm-check-updates -u && npm install
      - echo "Bumping npm dependencies in server/static..."
      - cd server/static && npx npm-check-updates -u && npm install
      - echo "Bumping npm dependencies in docs..."
      - cd docs && npx npm-check-updates -u && npm install
      - echo "All dependencies bumped! Run 'task' to test."
