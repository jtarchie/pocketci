---
# Pipeline testing cache behavior with and without a backend.
# Uses set -e so any failure in the cache directory (e.g. volume not mounted)
# immediately causes exit 1, making the bug visible in tests.

jobs:
  - name: build-with-cache
    plan:
      - task: first-build
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: busybox
          caches:
            - path: cache
          run:
            path: sh
            args:
              - -c
              - |
                  set -e
                  echo "first build"
                  echo "pocketci" > ./cache/data.txt
                  echo "written: $(cat ./cache/data.txt)"
        assert:
          stdout: "written: pocketci"
          code: 0

      - task: second-build
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: busybox
          caches:
            - path: cache
          run:
            path: sh
            args:
              - -c
              - |
                  set -e
                  echo "second build"
                  echo "read: $(cat ./cache/data.txt)"
        assert:
          stdout: "read: pocketci"
          code: 0
