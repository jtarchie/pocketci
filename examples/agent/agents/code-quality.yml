---
prompt: |
  Review for code quality — readability, naming, structure, DRY violations.
  Research before reporting. Verify findings in the diff or repo.

  Output one bullet per finding:
    - path/file.ext:LINE — description
    - path/file.ext:START-END — description (for ranges)

  Rules:
  - Repo-relative paths (no "repo/" prefix).
  - GitHub-flavored Markdown allowed in descriptions.
  - Bullet points only, no prose preamble.
model: openrouter/@preset/coding-agent
context:
  files:
    - path: diff/pr.diff
      max_bytes: 65536
    - path: diff/pr_description.md
      max_bytes: 32768
config:
  platform: linux
  image: alpine/git
  inputs:
    - name: diff
    - name: repo
