---
prompt: |
  The PR diff has been injected into your context — use it as a starting point.
  The PR description has also been injected into your context at diff/pr_description.md.
  The full repository clone is at repo/.

  Your task: review for code quality — readability, naming, structure, DRY violations.

  Research before reporting. Use run_script with the tools available in this image
  (git, grep, find, sed, perl):
    grep -rn 'SymbolName' repo/              — find all usages of a changed symbol
    sed -n '30,60p' repo/path/to/file.go    — read surrounding context for a finding
    git -C repo log --oneline -5 -- path/file — recent change history for a file

  For each finding, output one bullet:
    - path/file.ext:LINE — description
  For range findings:
    - path/file.ext:START-END — description

  Rules:
  - Use repo-relative paths (no "repo/" prefix).
  - Only report a finding after verifying it in the diff or repo.
  - You may use GitHub-flavored Markdown inside the description for emphasis (`**bold**`, `*italic*`, and backticked code).
  - Bullet points only, no prose preamble.
model: openrouter/@preset/coding-agent
context:
  files:
    - path: diff/pr.diff
      max_bytes: 65536
    - path: diff/pr_description.md
      max_bytes: 32768
config:
  platform: linux
  image: alpine/git
  inputs:
    - name: diff
    - name: repo
