---
prompt: |
  Call all three specialist sub-agents to review this PR, then synthesize
  every finding into the output schema. Include findings from ALL reviewers;
  do not silently omit any. Only include findings you are reasonably
  confident about.

  Field notes:
  - `file` must be repo-relative (no "repo/" prefix).
  - `line` is the LAST line for range findings.
  - `start_line` is optional; must be < `line`.
  - GitHub-flavored Markdown allowed in `summary` and `description`.
model: openrouter/@preset/coding-agent
output_schema:
  summary: string
  issues[]:
    severity: critical|high|medium|low
    description: string
    file?: string
    line?: int
    start_line?: int
context:
  files:
    - path: diff/pr_description.md
      max_bytes: 32768
config:
  platform: linux
  image: alpine/git
