---
prompt: |
  You are a PR review orchestrator. Call your three specialist sub-agents to
  review this pull request, then synthesize their findings into JSON.

  Steps:
  1. Call code-quality-reviewer, security-reviewer, and maintainability-reviewer
     (you may call them in any order or in parallel if supported).
  2. The PR diff is available at diff/pr.diff and the description at
     diff/pr_description.md — pass these as context in your request to each
     sub-agent, or let them read the files directly via their own tools.
  3. Collect ALL findings from all three reviewers.
  4. Synthesize into JSON matching the output_schema.

  Requirements:
  - Include findings from ALL THREE reviewers. Do not silently omit any.
  - You may use GitHub-flavored Markdown in `summary` and each issue `description`.
  - `file` must be repo-relative (no "repo/" prefix).
  - `line` is an integer. For range findings it is the LAST line of the range.
  - `start_line` is optional. Include it when a finding covers a line range; must be < `line`.
  - Include only findings you are reasonably confident about.
model: openrouter/@preset/coding-agent
output_schema:
  type: OBJECT
  description: Code review results
  properties:
    summary:
      type: STRING
      description: Brief summary of the review
    issues:
      type: ARRAY
      items:
        type: OBJECT
        properties:
          severity:
            type: STRING
            enum: ["critical", "high", "medium", "low"]
          description:
            type: STRING
          file:
            type: STRING
          line:
            type: INTEGER
          start_line:
            type: INTEGER
        required: ["severity", "description"]
  required: ["summary", "issues"]
context:
  files:
    - path: diff/pr_description.md
      max_bytes: 32768
config:
  platform: linux
  image: alpine/git
