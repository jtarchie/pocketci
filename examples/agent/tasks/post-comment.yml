---
platform: linux
image_resource:
  type: registry-image
  source: { repository: denoland/deno, tag: alpine }
inputs:
  - name: final-review
  - name: diff
  - name: repo
run:
  path: deno
  args:
    - run
    - --allow-read
    - --allow-env
    - --allow-net
    - repo/examples/agent/tasks/post_review.ts
env:
  GH_TOKEN: secret:GITHUB_TOKEN
