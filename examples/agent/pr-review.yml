---
# Multi-agent GitHub PR review pipeline.
#
# Triggered by a GitHub pull_request webhook. An orchestrator agent fans out
# to three specialist sub-agents, synthesises their findings into JSON, and
# a task step posts batched inline GitHub review comments.
#
# Required secrets:
#   GITHUB_TOKEN — repo + pull_request:write scope.
#
# Required setup:
#   Register a webhook pointing to http://<host>/api/webhooks/<id>
#   with Content-Type: application/json and a shared secret.
jobs:
  - name: review-pr
    triggers:
      webhook:
        filter: >-
          provider == "github" &&
          eventType == "pull_request" &&
          payload.action in ["opened", "synchronize"]
        params:
          PR_NUMBER: "string(payload.number)"
          PR_REPO: "'https://github.com/' + payload.pull_request.head.repo.full_name + '.git'"
          PR_HEAD_REF: "payload.pull_request.head.ref"
          PR_BASE_REF: "payload.pull_request.base.ref"
          GH_REPO: "payload.repository.full_name"
          PR_DESCRIPTION: "string(payload.pull_request.body || '')"
    plan:
      # Clone the PR branch (must be inline — file: refs depend on repo/).
      - task: checkout
        config:
          platform: linux
          image_resource:
            type: registry-image
            source: { repository: alpine/git }
          outputs:
            - name: repo
          run:
            path: sh
            args:
              - -c
              - |
                  git clone "$PR_REPO" repo
                  cd repo
                  git checkout "$PR_HEAD_REF"

      - task: generate-diff
        file: repo/examples/agent/tasks/generate-diff.yml

      # Orchestrator calls three specialist tools, then
      # synthesises findings into structured JSON.
      - agent: final-review
        file: repo/examples/agent/agents/final-reviewer.yml
        tools:
          - agent: code-quality-reviewer
            file: repo/examples/agent/agents/specialist-reviewer.yml
            prompt: "Review for code quality — readability, naming, structure, DRY violations."
          - agent: security-reviewer
            file: repo/examples/agent/agents/specialist-reviewer.yml
            prompt: "Audit for security issues — injection, authentication, data exposure, OWASP Top 10."
          - agent: maintainability-reviewer
            file: repo/examples/agent/agents/specialist-reviewer.yml
            prompt: "Evaluate for maintainability — test coverage, cyclomatic complexity, documentation."
        validation:
          expr: 'text != "" && text contains "summary"'
          prompt: >-
            You must output valid JSON containing a "summary" field and an
            "issues" array. Do not include prose outside the JSON object.

      - task: post-comment
        attempts: 2
        file: repo/examples/agent/tasks/post-comment.yml
