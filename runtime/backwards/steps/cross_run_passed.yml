# Test pipeline for cross-run `passed` dependencies.
# Job "deploy" depends on "build" via passed constraint on the get step.
# Within a single run, "build" runs first, then "deploy" cascades.
# Across runs, "deploy" can start immediately if "build" succeeded in a prior run.
resource_types:
  - name: mock
    type: registry-image
    source:
      repository: concourse/mock-resource

resources:
  - name: source-code
    type: mock
    source:
      force_version: "1.0"

assert:
  execution:
    - build
    - deploy

jobs:
  - name: build
    plan:
      - get: source-code
      - task: compile
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: busybox
          run:
            path: echo
            args: ["build complete"]
        assert:
          code: 0

  - name: deploy
    plan:
      - get: source-code
        passed: [build]
      - task: deploy-app
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: busybox
          run:
            path: echo
            args: ["deploy complete"]
        assert:
          code: 0
