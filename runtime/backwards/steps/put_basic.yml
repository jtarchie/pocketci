# Test basic put step with mock resource.
# Uses params to specify version, which both the native mock and
# concourse/mock-resource Docker image support.

assert:
  execution:
    - test-put

resource_types:
  - name: mock
    type: registry-image
    source:
      repository: concourse/mock-resource

resources:
  - name: my-output
    type: mock
    source: {}

jobs:
  - name: test-put
    plan:
      - put: my-output
        params:
          version: "42"
      - task: verify-put
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: busybox
          inputs:
            - name: my-output
          run:
            path: cat
            args: ["my-output/version"]
        assert:
          stdout: "42"
          code: 0
    assert:
      execution:
        - verify-put
