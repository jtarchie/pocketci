assert:
  execution:
    - "logs-job"

jobs:
  - name: logs-job
    plan:
      - task: logs-task
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: busybox
          run:
            path: sh
            args:
              - "-c"
              - |
                echo "hello from stdout"
                echo "hello from stderr" >&2
        assert:
          code: 0
          stdout: "hello from stdout"
          stderr: "hello from stderr"
