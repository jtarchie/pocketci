assert:
  execution:
    - "test-parallelism"

max_in_flight: 2

jobs:
  - name: test-parallelism
    max_in_flight: 2
    plan:
      - task: parallel-unit
        parallelism: 3
        config:
          platform: linux
          image_resource:
            type: docker-image
            source:
              repository: busybox
              tag: latest
          run:
            path: sh
            args:
              - -c
              - |
                  if [ -z "$CI_TASK_INDEX" ] || [ -z "$CI_TASK_COUNT" ]; then
                    echo "missing CI_TASK_* env vars"
                    exit 1
                  fi
                  if [ "$CI_TASK_COUNT" != "3" ]; then
                    echo "unexpected CI_TASK_COUNT: $CI_TASK_COUNT"
                    exit 1
                  fi
                  echo "Slot $CI_TASK_INDEX/$CI_TASK_COUNT"
        assert:
          code: 0
          stdout: "Slot "

    assert:
      execution:
        - "parallel-unit-1"
        - "parallel-unit-2"
        - "parallel-unit-3"
