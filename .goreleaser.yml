# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

before:
  hooks:
    - task build

builds:
  - id: pocketci
    binary: pocketci
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
    flags:
      - -trimpath

archives:
  - id: pocketci
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request

brews:
  - name: pocketci
    repository:
      owner: jtarchie
      name: pocketci
    homepage: "https://github.com/jtarchie/pocketci"
    description: "Local-first CI/CD runtime with JavaScript/TypeScript pipelines"
    license: "MIT"
    skip_upload: auto
    install: |
      bin.install "pocketci"
    test: |
      system "#{bin}/pocketci", "--version"

release:
  github:
    owner: jtarchie
    name: pocketci
  prerelease: auto
